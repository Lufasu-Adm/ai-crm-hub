<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI CRM Hub | Contact Enterprise Sales</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4 font-sans text-slate-800">

    <main class="w-full max-w-lg bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-100">
        <div class="bg-blue-600 px-8 py-6 text-white text-center">
            <h1 class="text-2xl font-bold tracking-tight">Hubungi Tim Sales</h1>
            <p class="text-blue-100 mt-2 text-sm">Tingkatkan efisiensi bisnis Anda dengan AI CRM Hub.</p>
        </div>

        <div class="p-8">
            <div id="alertBox" class="hidden mb-6 p-4 rounded-lg text-sm font-medium transition-all duration-300"></div>

            <form id="leadForm" class="space-y-5">
                <div>
                    <label for="full_name" class="block text-sm font-semibold text-slate-700 mb-1">Nama Lengkap <span class="text-red-500">*</span></label>
                    <input type="text" id="full_name" required 
                        class="w-full px-4 py-2 bg-slate-50 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors">
                </div>
                
                <div>
                    <label for="email" class="block text-sm font-semibold text-slate-700 mb-1">Email Perusahaan <span class="text-red-500">*</span></label>
                    <input type="email" id="email" required placeholder="anda@perusahaan.com"
                        class="w-full px-4 py-2 bg-slate-50 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors">
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div>
                        <label for="phone" class="block text-sm font-semibold text-slate-700 mb-1">No. WhatsApp</label>
                        <input type="tel" id="phone" placeholder="0812..."
                            class="w-full px-4 py-2 bg-slate-50 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors">
                    </div>
                    <div>
                        <label for="company" class="block text-sm font-semibold text-slate-700 mb-1">Nama Perusahaan</label>
                        <input type="text" id="company" placeholder="PT Maju Bersama"
                            class="w-full px-4 py-2 bg-slate-50 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors">
                    </div>
                </div>

                <div>
                    <label for="message" class="block text-sm font-semibold text-slate-700 mb-1">Kebutuhan Anda <span class="text-red-500">*</span></label>
                    <textarea id="message" rows="4" required placeholder="Ceritakan skala bisnis dan kebutuhan sistem Anda..."
                        class="w-full px-4 py-2 bg-slate-50 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors resize-none"></textarea>
                </div>

                <button type="submit" id="submitBtn" 
                    class="w-full flex justify-center items-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-bold text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-all disabled:opacity-70 disabled:cursor-not-allowed">
                    Kirim Permintaan Demo
                </button>
            </form>
        </div>
    </main>

    <script>
        /**
         * Clean Architecture JavaScript:
         * Memisahkan DOM Manipulation (UI) dengan Business Logic (API Call).
         */
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('leadForm');
            const submitBtn = document.getElementById('submitBtn');
            const alertBox = document.getElementById('alertBox');

            // Fungsi untuk mengatur state tombol loading
            const toggleLoadingState = (isLoading) => {
                submitBtn.disabled = isLoading;
                submitBtn.innerHTML = isLoading 
                    ? `<svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Memproses Data...` 
                    : 'Kirim Permintaan Demo';
            };

            // Fungsi untuk menampilkan pesan feedback ke user
            const showFeedback = (message, type = 'success') => {
                alertBox.className = `mb-6 p-4 rounded-lg text-sm font-medium ${
                    type === 'success' 
                    ? 'bg-green-50 text-green-800 border border-green-200' 
                    : 'bg-red-50 text-red-800 border border-red-200'
                }`;
                alertBox.textContent = message;
                alertBox.classList.remove('hidden');
            };

            // Event Listener Submit Form
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                toggleLoadingState(true);
                alertBox.classList.add('hidden');

                // Payload builder
                const payload = {
                    full_name: document.getElementById('full_name').value.trim(),
                    email: document.getElementById('email').value.trim(),
                    phone: document.getElementById('phone').value.trim(),
                    company: document.getElementById('company').value.trim(),
                    message: document.getElementById('message').value.trim(),
                    source: "landing_page"
                };

                try {
                    const response = await fetch('http://127.0.0.1:8000/leads', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) {
                        const errorData = await response.json();
                        throw new Error(errorData.detail || 'Terjadi kesalahan pada server.');
                    }

                    // Success handling
                    showFeedback('Data berhasil terkirim! Tim kami akan segera menghubungi Anda.', 'success');
                    form.reset();

                } catch (error) {
                    // Error handling
                    showFeedback(`Gagal: ${error.message}`, 'error');
                } finally {
                    toggleLoadingState(false);
                }
            });
        });
    </script>
</body>
</html>
