version: '3.8'

services:
  db:
    image: postgres:15
    container_name: crm_postgres
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
      POSTGRES_DB: crm_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:alpine
    container_name: crm_redis
    ports:
      - "6379:6379"
    restart: always
  
  n8n:
    image: n8nio/n8n:latest
    container_name: crm_n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - NODE_ENV=production
    volumes:
      - n8n_data:/home/node/.local/share/n8n
    restart: always

volumes:
  postgres_data:
  n8n_data: 